<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إدخال البيانات — مشرف بلدية</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Tajawal:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b3d3a">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="سلسلة التبريد">
</head>
<body>
  <div class="topbar">
    <div class="brand"><span class="dot"></span> منصة جرد معدات سلسلة التبريد</div>
    <div class="meta">
      <span id="userMunicipality">...</span>
      <button class="btn btn-ghost btn-sm" id="logoutBtn">خروج</button>
    </div>
  </div>

  <div class="container">

    <div class="card">
      <h2>إضافة مركز صحي جديد</h2>
      <div class="grid grid-2">
        <div>
          <label>اسم المركز الصحي</label>
          <input id="centerName" placeholder="مثال: المركز الصحي الرئيسي">
        </div>
        <div style="display:flex;align-items:end;">
          <button class="btn btn-primary" id="addCenterBtn" style="width:100%;padding:11px;">إضافة المركز</button>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>إضافة معدة تبريد</h2>
      <div class="grid grid-3">
        <div>
          <label>المركز الصحي</label>
          <select id="eqCenter"></select>
        </div>
        <div>
          <label>نوع المعدة</label>
          <select id="eqType"></select>
        </div>
        <div>
          <label>الموديل / الماركة</label>
          <input id="eqBrand" placeholder="مثال: Vestfrost MK304">
        </div>
        <div>
          <label>الرقم التسلسلي</label>
          <input id="eqSerial" placeholder="Serial Number">
        </div>
        <div>
          <label>السعة التخزينية (لتر)</label>
          <input id="eqCapacity" type="number" min="0" placeholder="مثال: 200">
        </div>
        <div>
          <label>حالة المعدة</label>
          <select id="eqStatus"></select>
        </div>
        <div style="grid-column:1/-1;">
          <label>ملاحظات</label>
          <textarea id="eqNotes" rows="2" placeholder="ملاحظات إضافية (اختياري)"></textarea>
        </div>
        <div style="display:flex;align-items:end;">
          <button class="btn btn-primary" id="addEquipBtn" style="width:100%;padding:11px;">إضافة المعدة</button>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>المعدات المسجلة في بلديتك</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>المركز الصحي</th><th>نوع المعدة</th><th>الماركة/الموديل</th>
              <th>الرقم التسلسلي</th><th>السعة (لتر)</th><th>الحالة</th><th>ملاحظات</th><th></th>
            </tr>
          </thead>
          <tbody id="equipTableBody"></tbody>
        </table>
      </div>
      <div class="empty-state" id="emptyState" style="display:none;">لا توجد معدات مسجلة بعد. ابدأ بإضافة مركز صحي ثم معداته.</div>
    </div>

    <footer class="note">منصة وزارة الصحة — جرد معدات سلسلة التبريد لبرنامج التطعيم</footer>
  </div>

<script type="module">
import {
  auth, db, signInAnonymously, onAuthStateChanged,
  collection, addDoc, query, where, onSnapshot, deleteDoc, doc, serverTimestamp,
  getMunicipalityFromToken
} from "./firebase-config.js";
import { EQUIPMENT_TYPES, EQUIPMENT_STATUS } from "./data.js";

let municipality = null;
let linkToken = null;
let centersCache = [];

const eqType = document.getElementById("eqType");
EQUIPMENT_TYPES.forEach(t => eqType.add(new Option(t, t)));
const eqStatus = document.getElementById("eqStatus");
EQUIPMENT_STATUS.forEach(s => eqStatus.add(new Option(s, s)));

init();

async function init() {
  // الرابط الخاص بالبلدية يأتي هكذا: supervisor.html?key=xxxxxxxx
  const params = new URLSearchParams(window.location.search);
  const urlToken = params.get("key");
  if (urlToken) {
    sessionStorage.setItem("coldchain_link_token", urlToken);
    window.history.replaceState({}, "", "supervisor.html"); // إخفاء المفتاح من شريط العنوان
  }
  linkToken = urlToken || sessionStorage.getItem("coldchain_link_token");

  if (!linkToken) {
    showInvalidLink("لا يوجد رابط بلدية. استخدم الرابط الخاص الذي أُرسل إلى بلديتك.");
    return;
  }

  municipality = await getMunicipalityFromToken(linkToken);
  if (!municipality) {
    showInvalidLink("هذا الرابط غير صالح أو تم إلغاؤه. تواصل مع الإدارة للحصول على رابط جديد.");
    return;
  }

  document.getElementById("userMunicipality").textContent = "بلدية: " + municipality;

  signInAnonymously(auth).catch(() => {
    showInvalidLink("تعذّر الاتصال بالخادم. تحقق من اتصالك بالإنترنت وأعد المحاولة.");
  });

  onAuthStateChanged(auth, (user) => {
    if (!user) return;
    listenCenters();
    listenEquipment();
  });
}

function showInvalidLink(message) {
  document.querySelector(".container").innerHTML = `
    <div class="card" style="text-align:center;padding:50px 20px;">
      <h2 style="color:var(--red);">تعذّر فتح الصفحة</h2>
      <p style="color:#5b6b68;">${message}</p>
    </div>`;
}

document.getElementById("logoutBtn").addEventListener("click", () => {
  sessionStorage.removeItem("coldchain_link_token");
  window.location.href = "index.html";
});

// ---------- مراكز صحية ----------
function listenCenters() {
  const q = query(collection(db, "centers"), where("municipality", "==", municipality));
  onSnapshot(q, (snap) => {
    centersCache = [];
    const sel = document.getElementById("eqCenter");
    sel.innerHTML = "";
    snap.forEach(d => {
      const data = { id: d.id, ...d.data() };
      centersCache.push(data);
      sel.add(new Option(data.name, d.id));
    });
    if (centersCache.length === 0) {
      sel.add(new Option("أضف مركزاً صحياً أولاً", ""));
    }
  });
}

document.getElementById("addCenterBtn").addEventListener("click", async () => {
  const name = document.getElementById("centerName").value.trim();
  if (!name) return alert("الرجاء إدخال اسم المركز الصحي");
  await addDoc(collection(db, "centers"), {
    name, municipality, linkToken, createdAt: serverTimestamp()
  });
  document.getElementById("centerName").value = "";
});

// ---------- معدات ----------
function listenEquipment() {
  const q = query(collection(db, "equipment"), where("municipality", "==", municipality));
  onSnapshot(q, (snap) => {
    const tbody = document.getElementById("equipTableBody");
    tbody.innerHTML = "";
    const rows = [];
    snap.forEach(d => rows.push({ id: d.id, ...d.data() }));
    document.getElementById("emptyState").style.display = rows.length ? "none" : "block";
    rows.forEach(r => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${r.centerName || ""}</td>
        <td>${r.type || ""}</td>
        <td>${r.brand || "-"}</td>
        <td>${r.serial || "-"}</td>
        <td>${r.capacity ?? "-"}</td>
        <td>${statusBadge(r.status)}</td>
        <td>${r.notes || "-"}</td>
        <td><button class="btn btn-danger btn-sm" data-id="${r.id}">حذف</button></td>
      `;
      tr.querySelector("button").addEventListener("click", async () => {
        if (confirm("تأكيد حذف هذه المعدة؟")) await deleteDoc(doc(db, "equipment", r.id));
      });
      tbody.appendChild(tr);
    });
  });
}

function statusBadge(status) {
  if (status === "تعمل بكفاءة") return `<span class="badge badge-ok">${status}</span>`;
  if (status === "تحتاج صيانة") return `<span class="badge badge-warn">${status}</span>`;
  return `<span class="badge badge-bad">${status || "غير محدد"}</span>`;
}

document.getElementById("addEquipBtn").addEventListener("click", async () => {
  const centerId = document.getElementById("eqCenter").value;
  if (!centerId) return alert("الرجاء إضافة مركز صحي واختياره أولاً");
  const center = centersCache.find(c => c.id === centerId);

  const payload = {
    municipality,
    linkToken,
    centerId,
    centerName: center ? center.name : "",
    type: document.getElementById("eqType").value,
    brand: document.getElementById("eqBrand").value.trim(),
    serial: document.getElementById("eqSerial").value.trim(),
    capacity: Number(document.getElementById("eqCapacity").value) || 0,
    status: document.getElementById("eqStatus").value,
    notes: document.getElementById("eqNotes").value.trim(),
    createdAt: serverTimestamp()
  };

  await addDoc(collection(db, "equipment"), payload);

  document.getElementById("eqBrand").value = "";
  document.getElementById("eqSerial").value = "";
  document.getElementById("eqCapacity").value = "";
  document.getElementById("eqNotes").value = "";
});
</script>
<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js").catch(() => {});
  }
</script>
</body>
</html>
