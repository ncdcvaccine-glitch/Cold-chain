<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منصة جرد معدات سلسلة التبريد</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Tajawal:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b3d3a">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="سلسلة التبريد">
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="logo">🧊</div>
      <h1>منصة جرد معدات سلسلة التبريد</h1>
      <p class="sub">التطعيم — على مستوى 101 بلدية</p>

      <form id="loginForm">
        <label for="email">البريد الإلكتروني</label>
        <input type="email" id="email" required placeholder="example@coldchain.ly">
        <div style="height:12px"></div>
        <label for="password">كلمة المرور</label>
        <input type="password" id="password" required placeholder="••••••••">
        <div style="height:18px"></div>
        <button type="submit" class="btn btn-primary" style="width:100%;padding:12px;" id="loginBtn">تسجيل الدخول</button>
        <div class="error-msg" id="errorMsg"></div>
      </form>
    </div>
  </div>

<script type="module">
import { auth, db, signInWithEmailAndPassword, onAuthStateChanged, getUserProfile } from "./firebase-config.js";

const form = document.getElementById("loginForm");
const errorMsg = document.getElementById("errorMsg");
const loginBtn = document.getElementById("loginBtn");

// إذا كان المستخدم مسجل دخول مسبقاً، حوّله مباشرة
onAuthStateChanged(auth, async (user) => {
  if (user) {
    const profile = await getUserProfile(user.uid);
    redirect(profile);
  }
});

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  errorMsg.style.display = "none";
  loginBtn.disabled = true;
  loginBtn.textContent = "جارٍ الدخول...";

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  try {
    const cred = await signInWithEmailAndPassword(auth, email, password);
    const profile = await getUserProfile(cred.user.uid);
    if (!profile) {
      showError("لم يتم العثور على صلاحيات لهذا الحساب. تواصل مع الإدارة.");
      return;
    }
    redirect(profile);
  } catch (err) {
    showError("بيانات الدخول غير صحيحة. تحقق من البريد وكلمة المرور.");
  } finally {
    loginBtn.disabled = false;
    loginBtn.textContent = "تسجيل الدخول";
  }
});

function showError(msg) {
  errorMsg.textContent = msg;
  errorMsg.style.display = "block";
}

function redirect(profile) {
  if (!profile) return;
  if (profile.role === "admin") {
    window.location.href = "admin.html";
  } else if (profile.role === "supervisor") {
    window.location.href = "supervisor.html";
  }
}
</script>

<div id="installBar" style="display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;padding:12px 18px;box-shadow:0 -4px 14px rgba(0,0,0,.12);display:flex;align-items:center;justify-content:space-between;gap:12px;font-family:'Cairo',sans-serif;">
  <span style="font-size:.88rem;color:#0b3d3a;font-weight:700;">ثبّت المنصة على هاتفك للوصول السريع دون متصفح</span>
  <button id="installAppBtn" class="btn btn-primary btn-sm">تثبيت التطبيق</button>
</div>
<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js").catch(() => {});
  }
  let deferredPrompt = null;
  window.addEventListener("beforeinstallprompt", (e) => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById("installBar").style.display = "flex";
  });
  document.getElementById("installAppBtn")?.addEventListener("click", async () => {
    document.getElementById("installBar").style.display = "none";
    if (deferredPrompt) {
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
    }
  });
  window.addEventListener("appinstalled", () => {
    document.getElementById("installBar").style.display = "none";
  });
</script>
</body>
</html>
